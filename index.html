<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Menyu | Choyxona</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f2f0e9;
            --card-bg-color: #ffffff;
            --header-color-1: #0a1f2e;
            --header-color-2: #1d3b4c;
            --accent-color: #e6b17e;
            --price-color: #0f5b3c;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg-color);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .menu-card {
            max-width: 420px;
            width: 100%;
            background: var(--card-bg-color);
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--header-color-1) 0%, var(--header-color-2) 100%);
            padding: 32px 24px 28px;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: "🍽️";
            position: absolute;
            right: -10px;
            bottom: -20px;
            font-size: 120px;
            opacity: 0.08;
            transform: rotate(-15deg);
        }
        .resto-name {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .resto-name i {
            background: rgba(255,255,255,0.15);
            padding: 10px;
            border-radius: 16px;
            font-size: 1.2rem;
        }

        /* Social icons */
        .social-row {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }
        .social-link {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .social-link:hover {
            background: #e6b17e;
            transform: translateY(-3px);
            border-color: transparent;
        }

        /* Category pills */
        .category-row {
            display: flex;
            gap: 8px;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
        }
        .cat-pill {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
            min-width: 100px;
        }
        .cat-pill.active {
            background: var(--accent-color);
            color: var(--header-color-1);
            border-color: var(--accent-color);
            font-weight: 600;
            box-shadow: 0 8px 20px -8px var(--accent-color);
        }
        .cat-pill i {
            margin-right: 6px;
            font-size: 1rem;
        }

        /* Main content */
        .content {
            padding: 28px 20px 24px;
            background: #ffffff;
        }

        /* Menu items - with images */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 32px;
            max-height: 400px;
            overflow-y: auto;
            padding-right: 4px;
        }
        
        /* Scroll bar styling */
        .menu-grid::-webkit-scrollbar {
            width: 4px;
        }
        .menu-grid::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .menu-grid::-webkit-scrollbar-thumb {
            background: #e6b17e;
            border-radius: 10px;
        }

        .menu-item {
            background: #f8f7f4;
            border-radius: 24px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .menu-item:hover {
            border-color: var(--accent-color);
            background: var(--card-bg-color);
            box-shadow: 0 10px 25px -12px var(--accent-color);
            transform: translateY(-2px);
        }

        /* Food image */
        .item-image {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            overflow: hidden;
            flex-shrink: 0;
            background: #eaeaea;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 2px solid white;
        }
        .item-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .item-image .no-image {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #e6b17e, #d49a6a);
            color: white;
            font-size: 1.8rem;
        }

        .item-info {
            flex: 1;
        }
        .item-info h4 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        .item-info .item-umumiy {
            font-size: 0.75rem;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 4px;
            line-height: 1.2;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .item-info .item-umumiy i {
            color: #e6b17e;
            font-size: 0.7rem;
        }
        .item-price {
            background: #dff1e8;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1rem;
            color: var(--price-color);
            border: 1px solid #c0e0d0;
            white-space: nowrap;
            margin-left: auto;
        }

        /* Detail panel */
        .detail-panel {
            background: #f8f7f4;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #eaeaea;
            margin-top: 8px;
        }
        .detail-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .detail-title i {
            color: #e6b17e;
            background: #fff1e0;
            padding: 8px;
            border-radius: 14px;
        }
        .detail-box {
            background: white;
            border-radius: 22px;
            padding: 18px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .detail-header {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            align-items: center;
        }
        .detail-image {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            border: 3px solid white;
        }
        .detail-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .detail-image .no-image {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #e6b17e, #d49a6a);
            color: white;
            font-size: 2.2rem;
        }
        .detail-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1d3b4c;
            letter-spacing: -0.4px;
            margin-bottom: 4px;
        }
        .detail-umumiy {
            background: #f0f9f4;
            padding: 16px;
            border-radius: 18px;
            margin-bottom: 16px;
            border-left: 4px solid #e6b17e;
        }
        .detail-umumiy-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #64748b;
            margin-bottom: 6px;
        }
        .detail-umumiy-text {
            font-size: 0.95rem;
            color: #334155;
            line-height: 1.5;
            font-style: italic;
        }
        .detail-desc {
            font-size: 0.9rem;
            color: #475569;
            line-height: 1.5;
            margin-bottom: 20px;
            background: #faf9f7;
            padding: 14px;
            border-radius: 16px;
        }
        .detail-cost {
            background: linear-gradient(135deg, #0f5b3c, #1a784b);
            color: white;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 14px 18px;
            border-radius: 30px;
            text-align: center;
            letter-spacing: -0.5px;
            box-shadow: 0 10px 20px -8px #0f5b3c;
        }
        .empty-detail {
            background: white;
            border-radius: 22px;
            padding: 32px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.95rem;
            border: 2px dashed #e2e8f0;
        }
        .empty-detail i {
            font-size: 2rem;
            color: #e6b17e;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* Footer */
        .footer {
            background: #f8f7f4;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eaeaea;
            font-size: 0.9rem;
            color: #64748b;
        }
        .footer-social {
            display: flex;
            gap: 12px;
        }
        .footer-social a {
            color: #64748b;
            font-size: 1.1rem;
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid #eaeaea;
        }
        .footer-social a:hover {
            background: #e6b17e;
            color: white;
            border-color: #e6b17e;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .menu-item {
            animation: fadeIn 0.3s ease forwards;
        }
    </style>
</head>
<body>
    <div class="menu-card">
        <!-- Header -->
        <div class="header">
            <div class="resto-name">
                <i class="fas fa-utensils"></i> CHAYXONA
            </div>
            
            <div class="social-row">
                <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-telegram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-facebook-f"></i></a>
            </div>

            <div class="category-row">
                <div class="cat-pill active" data-cat="salat">
                    <i class="fas fa-leaf"></i> Salat
                </div>
                <div class="cat-pill" data-cat="first">
                    <i class="fas fa-utensils"></i> 1-ovqat
                </div>
                <div class="cat-pill" data-cat="second">
                    <i class="fas fa-fire"></i> 2-ovqat
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="content">
            <div id="menuList" class="menu-grid">
                <!-- JS to'ldiradi -->
            </div>

            <!-- Detail panel -->
            <div id="detailPanel" class="detail-panel">
                <div class="detail-title">
                    <i class="fas fa-circle-info"></i> Taom tarkibi
                </div>
                <div id="detailContent" class="empty-detail">
                    <i class="fas fa-hand-pointer"></i>
                    <div>Taom tanlang</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>© 2026 · Chayxona</span>
            <div class="footer-social">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-telegram"></i></a>
            </div>
        </div>
    </div>

    <script>
        // DATA with images and "umumiy" (summary)
        const menuData = {
            salat: [
                { 
                    name: "Sezar salat", 
                    desc: "Tovuq filesi, aysberg, parmesan, kruton, sous",
                    umumiy: "Mazzali tovuq go'shti, yangi aysberg va maxsus sous bilan",
                    price: 32000,
                    image: "https://images.unsplash.com/photo-1550304943-4f24f54ddde9?w=200&h=200&fit=crop"
                },
                { 
                    name: "Yunon salat", 
                    desc: "Feta, bodring, pomidor, qalampir, zaytun",
                    umumiy: "Feta pishlog'i, yangi sabzavotlar va zaytun moyi",
                    price: 28000,
                    image: "https://images.unsplash.com/photo-1540420773420-3366772f4999?w=200&h=200&fit=crop"
                },
                { 
                    name: "Sabzavotli", 
                    desc: "Grill qovoq, baqlajon, bolgar, sarimsoq sous",
                    umumiy: "Grillda pishirilgan sabzavotlar, sarimsoq sousi",
                    price: 35000,
                    image: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=200&h=200&fit=crop"
                },
                { 
                    name: "Cobb", 
                    desc: "Tovuq, bekon, tuxum, avakado, pomidor, roka",
                    umumiy: "Amerika klassik salati, to'yingan va mazzali",
                    price: 39000,
                    image: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200&h=200&fit=crop"
                }
            ],
            first: [
                { 
                    name: "Mastava", 
                    desc: "Qo'y go'shti, guruch, sabzi, piyoz, zira",
                    umumiy: "An'anaviy o'zbek sho'rvasi, mayin ta'mli",
                    price: 27000,
                    image: "https://images.unsplash.com/photo-1547592166-23ac45744acd?w=200&h=200&fit=crop"
                },
                { 
                    name: "Lag'mon", 
                    desc: "Mol go'shti, qalampir, karam, sabzi, ko'k piyoz",
                    umumiy: "Uy usulida tayyorlangan uzun lag'mon",
                    price: 32000,
                    image: "https://images.unsplash.com/photo-1552611052-68e9c8c10aa4?w=200&h=200&fit=crop"
                },
                { 
                    name: "Sho'rva", 
                    desc: "Qo'y qovurg'a, no'xat, kartoshka, piyoz",
                    umumiy: "Qo'y go'shtli, to'yimli va issiq sho'rva",
                    price: 38000,
                    image: "https://images.unsplash.com/photo-1603105037880-4cd0f5c7f9b8?w=200&h=200&fit=crop"
                },
                { 
                    name: "Ugra", 
                    desc: "Qo'y go'shti, ugra, loviya, qatiq, sarimsoq",
                    umumiy: "Qatiq va sarimsoq bilan, an'anaviy ugra",
                    price: 34000,
                    image: "https://images.unsplash.com/photo-1552611052-68e9c8c10aa4?w=200&h=200&fit=crop"
                }
            ],
            second: [
                { 
                    name: "Qiyma kabob", 
                    desc: "Mol go'shti qiymasi, piyoz, zira, non",
                    umumiy: "Tandirda pishirilgan qiyma kabob",
                    price: 45000,
                    image: "https://images.unsplash.com/photo-1599487488170-d11ec9c172f0?w=200&h=200&fit=crop"
                },
                { 
                    name: "Qozon kabob", 
                    desc: "Qo'y go'shti, kartoshka, piyoz, qazi",
                    umumiy: "Qozonda dimlangan qo'y go'shti",
                    price: 52000,
                    image: "https://images.unsplash.com/photo-1604908176997-125f25e8136a?w=200&h=200&fit=crop"
                },
                { 
                    name: "Tandir tovuq", 
                    desc: "Tovuq, tandir ziravorlari, kartoshka",
                    umumiy: "Maxsus ziravorlarda tandirda pishgan tovuq",
                    price: 48000,
                    image: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=200&h=200&fit=crop"
                },
                { 
                    name: "Jiz", 
                    desc: "Qo'y jigari, piyoz, kartoshka, maxsus zira",
                    umumiy: "Qizdirilgan qo'y jigari, kartoshka bilan",
                    price: 43000,
                    image: "https://images.unsplash.com/photo-1604908176997-125f25e8136a?w=200&h=200&fit=crop"
                }
            ]
        };

        const menuList = document.getElementById('menuList');
        const detailContent = document.getElementById('detailContent');
        const catPills = document.querySelectorAll('.cat-pill');
        
        let activeCat = 'salat';
        let menuCategories = [
            { id: 'salat', name: 'Salat', icon: 'fas fa-leaf' },
            { id: 'first', name: '1-ovqat', icon: 'fas fa-utensils' },
            { id: 'second', name: '2-ovqat', icon: 'fas fa-fire' }
        ];

        // Category click
        catPills.forEach(pill => {
            pill.addEventListener('click', function() {
                catPills.forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                activeCat = this.dataset.cat;
                renderMenu(activeCat);
                
                // Clear detail panel when changing category
                detailContent.innerHTML = `
                    <div class="empty-detail">
                        <i class="fas fa-hand-pointer"></i>
                        <div>Taom tanlang</div>
                    </div>
                `;
            });
        });

        // Render menu items with images and "umumiy"
        function renderMenu(category) {
            const items = menuData[category];
            if (!items) return;

            let html = '';
            items.forEach((item, index) => {
                // Image or placeholder
                const imageHtml = item.image 
                    ? `<img src="${item.image}" alt="${item.name}" loading="lazy">`
                    : `<div class="no-image"><i class="fas fa-utensils"></i></div>`;
                
                html += `
                    <div class="menu-item" 
                         data-name="${item.name}" 
                         data-desc="${item.desc}" 
                         data-umumiy="${item.umumiy || 'Mazzali taom'}"
                         data-price="${item.price}"
                         data-image="${item.image || ''}">
                        <div class="item-image">
                            ${imageHtml}
                        </div>
                        <div class="item-info">
                            <h4>${item.name}</h4>
                            <div class="item-umumiy">
                                <i class="fas fa-circle"></i> ${(item.umumiy || 'Mazzali taom').substring(0, 40)}...
                            </div>
                        </div>
                        <div class="item-price">${Math.floor(item.price/1000)}k</div>
                    </div>
                `;
            });
            menuList.innerHTML = html;

            // Add click to each item
            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', function() {
                    const name = this.dataset.name;
                    const desc = this.dataset.desc;
                    const umumiy = this.dataset.umumiy;
                    const price = this.dataset.price;
                    const image = this.dataset.image;
                    
                    // Image for detail
                    const imageHtml = image 
                        ? `<img src="${image}" alt="${name}">`
                        : `<div class="no-image"><i class="fas fa-utensils"></i></div>`;
                    
                    detailContent.innerHTML = `
                        <div class="detail-box">
                            <div class="detail-header">
                                <div class="detail-image">
                                    ${imageHtml}
                                </div>
                                <div>
                                    <div class="detail-name">${name}</div>
                                    <div style="color: #64748b; font-size: 0.85rem; margin-top: 4px;">
                                        <i class="fas fa-star" style="color: #e6b17e;"></i> Eng sara taom
                                    </div>
                                </div>
                            </div>
                            
                            <div class="detail-umumiy">
                                <div class="detail-umumiy-title"><i class="fas fa-info-circle"></i> UMUMIY</div>
                                <div class="detail-umumiy-text">${umumiy}</div>
                            </div>
                            
                            <div class="detail-desc">
                                <i class="fas fa-clipboard-list" style="color: #e6b17e; margin-right: 6px;"></i>
                                <strong>Tarkibi:</strong> ${desc}
                            </div>
                            
                            <div class="detail-cost">${Number(price).toLocaleString()} so'm</div>
                        </div>
                    `;
                });
            });
        }

        // Initial render
        renderMenu('salat');
        renderCategoryPills();

        // Load from localStorage on startup
        window.addEventListener('DOMContentLoaded', () => {
            const savedCategories = localStorage.getItem('menuCategories');
            const savedData = localStorage.getItem('menuData');
            const savedColors = localStorage.getItem('siteColors');
            const savedTexts = localStorage.getItem('siteTexts');
            
            if (savedCategories) {
                menuCategories = JSON.parse(savedCategories);
            }
            if (savedData) {
                const parsedData = JSON.parse(savedData);
                Object.keys(parsedData).forEach(key => {
                    if (menuData[key]) {
                        menuData[key] = parsedData[key];
                    }
                });
            }
            
            // Apply colors
            if (savedColors) {
                const colors = JSON.parse(savedColors);
                const root = document.documentElement.style;
                if (colors.bgColor) root.setProperty('--bg-color', colors.bgColor);
                if (colors.cardBgColor) root.setProperty('--card-bg-color', colors.cardBgColor);
                if (colors.headerColor1) root.setProperty('--header-color-1', colors.headerColor1);
                if (colors.headerColor2) root.setProperty('--header-color-2', colors.headerColor2);
                if (colors.accentColor) root.setProperty('--accent-color', colors.accentColor);
                if (colors.priceColor) root.setProperty('--price-color', colors.priceColor);
            }
            
            // Apply texts
            if (savedTexts) {
                const texts = JSON.parse(savedTexts);
                if (texts.restoName) {
                    const restoEl = document.querySelector('.resto-name');
                    restoEl.innerHTML = '<i class="fas fa-utensils"></i> ' + texts.restoName;
                    if (texts.restoNameSize) restoEl.style.fontSize = texts.restoNameSize + 'px';
                }
                if (texts.footerText) {
                    const footerEl = document.querySelector('.footer span');
                    footerEl.textContent = texts.footerText;
                    if (texts.footerSize) footerEl.style.fontSize = texts.footerSize + 'px';
                }
                if (texts.emptyPanelText) {
                    const panelEl = document.querySelector('#detailContent div:last-child');
                    panelEl.textContent = texts.emptyPanelText;
                    if (texts.emptyPanelSize) panelEl.style.fontSize = texts.emptyPanelSize + 'px';
                }
                
                // Update category pill names
                renderCategoryPills();
            }
            
            renderCategoryPills();
            renderMenu(activeCat);
        });

        function renderCategoryPills() {
            const container = document.querySelector('.category-row');
            container.innerHTML = '';
            
            menuCategories.forEach(cat => {
                const pill = document.createElement('div');
                pill.className = 'cat-pill' + (activeCat === cat.id ? ' active' : '');
                pill.dataset.cat = cat.id;
                pill.innerHTML = `<i class="${cat.icon}"></i> ${cat.name}`;
                pill.onclick = function() {
                    document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
                    this.classList.add('active');
                    activeCat = this.dataset.cat;
                    renderMenu(activeCat);
                };
                container.appendChild(pill);
            });
        }
    </script>
</body>
</html>
