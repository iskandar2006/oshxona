<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Menyu | Choyxona</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts (Inter - zamonaviy font) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f2f0e9;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .menu-card {
            max-width: 400px;
            width: 100%;
            background: #ffffff;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            position: relative;
        }

        /* Header with pattern */
        .header {
            background: linear-gradient(135deg, #0a1f2e 0%, #1d3b4c 100%);
            padding: 32px 24px 28px;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: "🍽️";
            position: absolute;
            right: -10px;
            bottom: -20px;
            font-size: 120px;
            opacity: 0.08;
            transform: rotate(-15deg);
        }
        .header::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255,215,150,0.1) 0%, transparent 50%);
        }
        .resto-name {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            letter-spacing: -0.5px;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .resto-name i {
            background: rgba(255,255,255,0.15);
            padding: 10px;
            border-radius: 16px;
            font-size: 1.2rem;
        }

        /* Social icons modern */
        .social-row {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }
        .social-link {
            width: 44px;
            height: 44px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .social-link:hover {
            background: #e6b17e;
            transform: translateY(-3px);
            border-color: transparent;
        }

        /* Category pills */
        .category-row {
            display: flex;
            gap: 8px;
            position: relative;
            z-index: 2;
            flex-wrap: wrap;
        }
        .cat-pill {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 12px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
            min-width: 100px;
            letter-spacing: -0.2px;
        }
        .cat-pill.active {
            background: #e6b17e;
            color: #0a1f2e;
            border-color: #e6b17e;
            font-weight: 600;
            box-shadow: 0 8px 20px -8px #e6b17e;
        }
        .cat-pill i {
            margin-right: 6px;
            font-size: 1rem;
        }

        /* Main content */
        .content {
            padding: 28px 24px 24px;
            background: #ffffff;
        }

        /* Menu items - modern card style */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 32px;
            min-height: 340px;
        }
        .menu-item {
            background: #f8f7f4;
            border-radius: 28px;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .menu-item:hover {
            border-color: #e6b17e;
            background: #ffffff;
            box-shadow: 0 10px 25px -12px #e6b17e;
            transform: translateY(-2px);
        }
        .item-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .item-number {
            width: 44px;
            height: 44px;
            background: #ffffff;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #1d3b4c;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            font-size: 1.1rem;
            border: 1px solid #eaeaea;
        }
        .item-info h4 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        .item-info p {
            font-size: 0.8rem;
            color: #64748b;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .item-price {
            background: #dff1e8;
            padding: 10px 18px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            color: #0f5b3c;
            letter-spacing: -0.3px;
            border: 1px solid #c0e0d0;
        }

        /* Detail panel - modern glass */
        .detail-panel {
            background: #f8f7f4;
            border-radius: 28px;
            padding: 24px;
            border: 1px solid #eaeaea;
            margin-top: 8px;
        }
        .detail-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .detail-title i {
            color: #e6b17e;
            background: #fff1e0;
            padding: 8px;
            border-radius: 14px;
        }
        .detail-box {
            background: white;
            border-radius: 22px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .detail-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1d3b4c;
            margin-bottom: 12px;
            letter-spacing: -0.4px;
        }
        .detail-desc {
            font-size: 0.95rem;
            color: #475569;
            line-height: 1.6;
            margin-bottom: 20px;
            border-left: 3px solid #e6b17e;
            padding-left: 16px;
        }
        .detail-cost {
            background: linear-gradient(135deg, #0f5b3c, #1a784b);
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            padding: 14px 20px;
            border-radius: 30px;
            text-align: center;
            letter-spacing: -0.5px;
            box-shadow: 0 10px 20px -8px #0f5b3c;
        }
        .empty-detail {
            background: white;
            border-radius: 22px;
            padding: 32px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.95rem;
            border: 2px dashed #e2e8f0;
        }
        .empty-detail i {
            font-size: 2rem;
            color: #e6b17e;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        /* Footer */
        .footer {
            background: #f8f7f4;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eaeaea;
            font-size: 0.9rem;
            color: #64748b;
        }
        .footer-social {
            display: flex;
            gap: 12px;
        }
        .footer-social a {
            color: #64748b;
            font-size: 1.1rem;
            width: 36px;
            height: 36px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.2s;
            border: 1px solid #eaeaea;
        }
        .footer-social a:hover {
            background: #e6b17e;
            color: white;
            border-color: #e6b17e;
        }

        /* Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .menu-item {
            animation: fadeIn 0.3s ease forwards;
        }
    </style>
</head>
<body>
    <div class="menu-card">
        <!-- Header -->
        <div class="header">
            <div class="resto-name">
                <i class="fas fa-utensils"></i> CHAYXONA
            </div>
            
            <div class="social-row">
                <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-telegram"></i></a>
                <a href="#" class="social-link"><i class="fab fa-facebook-f"></i></a>
            </div>

            <div class="category-row">
                <div class="cat-pill active" data-cat="salat">
                    <i class="fas fa-leaf"></i> Salat
                </div>
                <div class="cat-pill" data-cat="first">
                    <i class="fas fa-utensils"></i> 1-ovqat
                </div>
                <div class="cat-pill" data-cat="second">
                    <i class="fas fa-fire"></i> 2-ovqat
                </div>
            </div>
        </div>

        <!-- Content -->
        <div class="content">
            <div id="menuList" class="menu-grid">
                <!-- JS to'ldiradi -->
            </div>

            <!-- Detail panel -->
            <div id="detailPanel" class="detail-panel">
                <div class="detail-title">
                    <i class="fas fa-circle-info"></i> Taom tarkibi
                </div>
                <div id="detailContent" class="empty-detail">
                    <i class="fas fa-hand-pointer"></i>
                    <div>Taom tanlang</div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span>© 2026 · Chayxona</span>
            <div class="footer-social">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-telegram"></i></a>
            </div>
        </div>
    </div>

    <script>
        // DATA
        const menuData = {
            salat: [
                { name: "Sezar salat", desc: "Tovuq filesi, aysberg, parmesan, kruton, sous", price: 32000 },
                { name: "Yunon salat", desc: "Feta, bodring, pomidor, qalampir, zaytun", price: 28000 },
                { name: "Sabzavotli", desc: "Grill qovoq, baqlajon, bolgar, sarimsoq sous", price: 35000 },
                { name: "Cobb", desc: "Tovuq, bekon, tuxum, avakado, pomidor, roka", price: 39000 }
            ],
            first: [
                { name: "Mastava", desc: "Qo'y go'shti, guruch, sabzi, piyoz, zira", price: 27000 },
                { name: "Lag'mon", desc: "Mol go'shti, qalampir, karam, sabzi, ko'k piyoz", price: 32000 },
                { name: "Sho'rva", desc: "Qo'y qovurg'a, no'xat, kartoshka, piyoz", price: 38000 },
                { name: "Ugra", desc: "Qo'y go'shti, ugra, loviya, qatiq, sarimsoq", price: 34000 }
            ],
            second: [
                { name: "Qiyma kabob", desc: "Mol go'shti qiymasi, piyoz, zira, non", price: 45000 },
                { name: "Qozon kabob", desc: "Qo'y go'shti, kartoshka, piyoz, qazi", price: 52000 },
                { name: "Tandir tovuq", desc: "Tovuq, tandir ziravorlari, kartoshka", price: 48000 },
                { name: "Jiz", desc: "Qo'y jigari, piyoz, kartoshka, maxsus zira", price: 43000 }
            ]
        };

        const menuList = document.getElementById('menuList');
        const detailContent = document.getElementById('detailContent');
        const catPills = document.querySelectorAll('.cat-pill');
        
        let activeCat = 'salat';

        // Category click
        catPills.forEach(pill => {
            pill.addEventListener('click', function() {
                catPills.forEach(p => p.classList.remove('active'));
                this.classList.add('active');
                activeCat = this.dataset.cat;
                renderMenu(activeCat);
            });
        });

        // Render menu items
        function renderMenu(category) {
            const items = menuData[category];
            if (!items) return;

            let html = '';
            items.forEach((item, index) => {
                html += `
                    <div class="menu-item" data-name="${item.name}" data-desc="${item.desc}" data-price="${item.price}">
                        <div class="item-left">
                            <div class="item-number">${index + 1}</div>
                            <div class="item-info">
                                <h4>${item.name}</h4>
                                <p><i class="fas fa-chevron-right" style="font-size: 8px;"></i> batafsil</p>
                            </div>
                        </div>
                        <div class="item-price">${Math.floor(item.price/1000)}k</div>
                    </div>
                `;
            });
            menuList.innerHTML = html;

            // Add click to each item
            document.querySelectorAll('.menu-item').forEach(item => {
                item.addEventListener('click', function() {
                    const name = this.dataset.name;
                    const desc = this.dataset.desc;
                    const price = this.dataset.price;
                    
                    detailContent.innerHTML = `
                        <div class="detail-box">
                            <div class="detail-name">${name}</div>
                            <div class="detail-desc">${desc}</div>
                            <div class="detail-cost">${Number(price).toLocaleString()} so'm</div>
                        </div>
                    `;
                });
            });
        }

        // Initial render
        renderMenu('salat');
    </script>
</body>
</html>
